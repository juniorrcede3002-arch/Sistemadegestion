<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC - Sistema de Gestión GSCI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #1e40af; --accent: #3b82f6; --bg: #f8fafc;
            --success: #059669; --warning: #d97706; --danger: #dc2626;
            --info: #0891b2; --white: #ffffff; --border: #e2e8f0; --sidebar: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* Pantallas de Acceso */
        #login-screen { position: fixed; inset: 0; background: var(--sidebar); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        #setup-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: none; align-items: center; justify-content: center; z-index: 6000; }
        
        .login-box { background: var(--white); padding: 30px; border-radius: 24px; max-width: 400px; width: 90%; text-align: center; }

        /* Sidebar Responsivo */
        .sidebar { 
            width: 280px; background: var(--sidebar); color: white; display: none; 
            flex-direction: column; padding: 20px; transition: all 0.3s ease;
            z-index: 1000;
        }

        /* Header Móvil */
        .mobile-header {
            display: none; background: var(--sidebar); color: white;
            padding: 15px; justify-content: space-between; align-items: center;
        }

        /* Main Content */
        .main { flex: 1; padding: 30px; overflow-y: auto; display: none; }
        .section { display: none; }
        .section.active { display: block; }

        /* UI Elements */
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid-2, .grid-3, .grid-4 { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; font-size: 14px; }
        
        .btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        /* RESPONSIVIDAD */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                position: fixed; left: -280px; top: 0; bottom: 0; 
                display: flex !important; width: 260px; box-shadow: 10px 0 30px rgba(0,0,0,0.3);
            }
            .sidebar.open { left: 0; }
            .mobile-header { display: flex; }
            .main { padding: 15px; }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .modal-content { grid-template-columns: 1fr !important; height: 95vh; }
        }

        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .nav-link { display: flex; align-items: center; padding: 12px; color: #94a3b8; border: none; background: none; cursor: pointer; width: 100%; border-radius: 12px; margin-bottom: 5px; font-size: 14px; }
        .nav-link.active { background: var(--accent); color: white; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 95%; max-width: 1000px; border-radius: 20px; display: grid; grid-template-columns: 1fr 300px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="spinner"></div></div>

    <div class="mobile-header">
        <span style="font-weight: 800;">GSCI SGC</span>
        <button class="btn btn-primary" onclick="window.toggleSidebar()"><span class="material-icons-round">menu</span></button>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--primary)">SGC Acceso</h2>
            <button class="btn-google" id="btn-login-google" style="width:100%; margin-top:20px; padding:12px; border:1px solid #ddd; border-radius:10px; background:white; cursor:pointer; font-weight:700;">
                Continuar con Google
            </button>
        </div>
    </div>

    <div id="setup-screen">
        <div class="login-box">
            <h3>Nombre de tu Espacio</h3>
            <input type="text" id="setup-ws-name" placeholder="Ej: Mi Empresa SGC">
            <button class="btn btn-primary" style="width:100%" id="btn-confirm-setup">CREAR</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="margin-bottom:30px;">
            <h2 id="display-ws-name" style="color:var(--accent); font-size:16px;">MI ESPACIO</h2>
        </div>
        <nav style="flex:1">
            <button class="nav-link active" onclick="cambiarVista('sec-dash', this)"><span class="material-icons-round">dashboard</span> Dashboard</button>
            <button class="nav-link" onclick="cambiarVista('sec-crear', this)"><span class="material-icons-round">add_circle</span> Nueva Solicitud</button>
            <button class="nav-link" onclick="cambiarVista('sec-gest', this)"><span class="material-icons-round">assignment</span> Gestión</button>
            <button class="nav-link" onclick="cambiarVista('sec-colab', this)"><span class="material-icons-round">people</span> Colaboradores</button>
            <button class="nav-link" onclick="cambiarVista('sec-struct', this)"><span class="material-icons-round">settings</span> Estructura</button>
        </nav>
        <button onclick="logout()" class="nav-link" style="color:var(--danger);"><span class="material-icons-round">logout</span> Salir</button>
    </aside>

    <main class="main" id="main">
        <section id="sec-dash" class="section active">
            <h1>Dashboard</h1>
            <div class="grid-4" style="margin-top:20px;">
                <div class="card"><label>Total</label><h2 id="dash-tot">0</h2></div>
                <div class="card"><label>Pendientes</label><h2 id="dash-pend">0</h2></div>
            </div>
        </section>

        <section id="sec-crear" class="section">
            <div class="card">
                <h2>Registrar Solicitud</h2>
                <div class="grid-2">
                    <div>
                        <label>Acción</label>
                        <select id="sol-accion" onchange="toggleDetalles(this.value)">
                            <option value="Creación">Creación</option>
                            <option value="Modificación">Modificación</option>
                            <option value="Inactivación">Inactivación</option>
                        </select>
                    </div>
                    <div><label>Tipo Documento</label><select id="sol-tipo-doc"></select></div>
                </div>
                
                <div id="panel-extra" style="display:none; background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:15px;">
                    <div class="grid-3">
                        <div><label>Código Actual</label><input type="text" id="sol-cod-ref"></div>
                        <div><label>Versión Actual</label><input type="text" id="sol-ver-ref"></div>
                        <div><label>Fecha Ult. Ver.</label><input type="date" id="sol-fecha-ref"></div>
                    </div>
                </div>

                <label>Título</label><input type="text" id="sol-tit">
                <div class="grid-2">
                    <div><label>Gerencia</label><select id="sol-ger" onchange="actualizarDeptos(this.value)"></select></div>
                    <div><label>Departamento</label><select id="sol-dep"></select></div>
                </div>
                <label>Justificación</label><textarea id="sol-motivo" rows="3"></textarea>
                <label>Archivo</label><input type="file" id="sol-file">
                <button class="btn btn-primary" style="width:100%" id="btnSendSol">ENVIAR</button>
            </div>
        </section>

        <section id="sec-gest" class="section">
            <h1>Gestión de Solicitudes</h1>
            <div class="card" style="padding:0; margin-top:20px;">
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>ID</th><th>Título</th><th>Estado</th><th>Acción</th></tr></thead>
                        <tbody id="tbody-gestionar"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-colab" class="section">
            <h1>Colaboradores</h1>
            <div class="grid-2">
                <div class="card">
                    <h3>Añadir Miembro</h3>
                    <input type="email" id="invite-email" placeholder="usuario@correo.com">
                    <button class="btn btn-primary" onclick="enviarInvitacion()">Invitar</button>
                </div>
                <div class="card" style="padding:0;">
                    <table><thead><tr><th>Usuario</th><th>Rol</th><th>Eliminar</th></tr></thead><tbody id="tbody-colabs"></tbody></table>
                </div>
            </div>
        </section>

        <section id="sec-struct" class="section">
            <div class="grid-3">
                <div class="card">
                    <h3>Tipos Doc.</h3>
                    <div style="display:flex; gap:5px;"><input type="text" id="t-nom"><button class="btn btn-success" onclick="agregarTipoDoc()">+</button></div>
                    <div id="list-tipos"></div>
                </div>
                <div class="card">
                    <h3>Gerencias</h3>
                    <div style="display:flex; gap:5px;"><input type="text" id="g-nom"><button class="btn btn-success" onclick="guardarGerencia()">+</button></div>
                    <div id="list-ger"></div>
                </div>
                <div class="card">
                    <h3>Depto.</h3>
                    <select id="d-ger-sel"></select>
                    <div style="display:flex; gap:5px;"><input type="text" id="d-nom"><button class="btn btn-success" onclick="guardarDepartamento()">+</button></div>
                    <div id="list-dep"></div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="padding:20px;">
                <h2 id="m-tit">Detalle</h2>
                <div id="m-data" style="margin-top:15px;"></div>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn btn-primary" onclick="firmarPaso()">Firmar</button>
                    <button class="btn btn-danger" onclick="closeModal()">Cerrar</button>
                </div>
            </div>
            <div style="background:#f8fafc; padding:20px; border-left:1px solid #ddd;">
                <h4>Chat</h4>
                <div id="chat-box" style="height:300px; overflow-y:auto; font-size:12px;"></div>
                <input type="text" id="m-comment" placeholder="Comentar...">
                <button class="btn btn-primary" style="width:100%" onclick="enviarComentario()">Enviar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, updateDoc, setDoc, query, where, getDocs, arrayUnion, runTransaction, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHflRFI5xQjiRQDwZyfizelEilAE0TjXo",
            authDomain: "sistemadegestion2-fd38e.firebaseapp.com",
            projectId: "sistemadegestion2-fd38e",
            storageBucket: "sistemadegestion2-fd38e.firebasestorage.app",
            messagingSenderId: "871879438988",
            appId: "1:871879438988:web:a3b9b63193879e8668c1a9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const CLOUD_NAME = "df79cjklp";
        const UPLOAD_PRESET = "sistema2";

        let currentWS = null, userData = null, selectedId = null, selectedData = null;
        let allDeps = [], tiposDoc = [];

        // --- FUNCIONES GLOBALES (VINCULADAS A WINDOW PARA EVITAR REFERENCIA NO DEFINIDA) ---
        
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
        
        window.cambiarVista = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const sec = document.getElementById(id);
            if(sec) sec.classList.add('active');
            if(btn) btn.classList.add('active');
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
        };

        window.toggleDetalles = (val) => {
            document.getElementById('panel-extra').style.display = (val === 'Creación') ? 'none' : 'block';
        };

        window.verDetalle = async (id) => {
            selectedId = id;
            const snap = await getDoc(doc(db, "Solicitudes", id));
            selectedData = snap.data();
            document.getElementById('m-tit').innerText = "Solicitud ID: " + (selectedData.customId || id);
            document.getElementById('m-data').innerHTML = `<b>Título:</b> ${selectedData.titulo}<br><b>Estado:</b> ${selectedData.estado}`;
            const cb = document.getElementById('chat-box');
            cb.innerHTML = (selectedData.chat || []).map(c => `<div><b>${c.u}:</b> ${c.m}</div>`).join('');
            document.getElementById('modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        // --- GENERADOR DE ID CODIFICADO (00001, 00002...) ---
        async function getNextSequenceId() {
            const counterRef = doc(db, "workspaces", currentWS, "counters", "solicitudes");
            let newId = 1;
            await runTransaction(db, async (transaction) => {
                const snap = await transaction.get(counterRef);
                if (snap.exists()) {
                    newId = snap.data().val + 1;
                    transaction.update(counterRef, { val: newId });
                } else {
                    transaction.set(counterRef, { val: 1 });
                }
            });
            return String(newId).padStart(5, '0');
        }

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uRef = doc(db, "users", user.uid);
                const snap = await getDoc(uRef);
                if (snap.exists()) {
                    userData = snap.data();
                    currentWS = userData.wsId;
                    initApp();
                } else {
                    const q = query(collection(db, "invitations"), where("email", "==", user.email.toLowerCase()));
                    const invSnap = await getDocs(q);
                    if (!invSnap.empty) {
                        currentWS = invSnap.docs[0].data().wsId;
                        userData = { uid: user.uid, email: user.email, wsId: currentWS, role: "Colaborador", nombre: user.displayName };
                        await setDoc(uRef, userData);
                        initApp();
                    } else {
                        document.getElementById('setup-screen').style.display = 'flex';
                        document.getElementById('login-screen').style.display = 'none';
                    }
                }
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('main').style.display = 'none';
            }
        });

        document.getElementById('btn-login-google').onclick = () => signInWithPopup(auth, provider);

        document.getElementById('btn-confirm-setup').onclick = async () => {
            const wsName = document.getElementById('setup-ws-name').value.trim();
            if(!wsName) return;
            const wsId = "WS-" + Date.now();
            await setDoc(doc(db, "workspaces", wsId), { name: wsName, owner: auth.currentUser.uid });
            await setDoc(doc(db, "users", auth.currentUser.uid), { uid: auth.currentUser.uid, email: auth.currentUser.email, wsId, role: "Admin", nombre: auth.currentUser.displayName });
            location.reload();
        };

        async function initApp() {
            const wsSnap = await getDoc(doc(db, "workspaces", currentWS));
            document.getElementById('display-ws-name').innerText = wsSnap.data().name;
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main').style.display = 'block';
            document.getElementById('login-screen').style.display = 'none';
            cargarDatos();
        }

        function cargarDatos() {
            const q = (c) => query(collection(db, c), where("wsId", "==", currentWS));

            onSnapshot(q("Solicitudes"), s => {
                let html = "", tot = 0, pend = 0;
                s.forEach(d => {
                    const sol = d.data(); tot++;
                    if(sol.estado !== "Aprobado Final") pend++;
                    html += `<tr><td>${sol.customId || 'S/N'}</td><td>${sol.titulo}</td><td>${sol.estado}</td><td><button class="btn btn-ghost" onclick="verDetalle('${d.id}')">Ver</button></td></tr>`;
                });
                document.getElementById('tbody-gestionar').innerHTML = html;
                document.getElementById('dash-tot').innerText = tot;
                document.getElementById('dash-pend').innerText = pend;
            });

            onSnapshot(q("Gerencias"), s => {
                let h = "", opts = "<option value=''>-- Seleccionar --</option>";
                s.forEach(d => {
                    h += `<div>${d.data().nombre} <button onclick="del('Gerencias','${d.id}')">X</button></div>`;
                    opts += `<option value="${d.data().nombre}">${d.data().nombre}</option>`;
                });
                document.getElementById('list-ger').innerHTML = h;
                document.getElementById('sol-ger').innerHTML = opts;
                document.getElementById('d-ger-sel').innerHTML = opts;
            });

            onSnapshot(q("Departamentos"), s => {
                allDeps = []; s.forEach(d => allDeps.push(d.data()));
            });

            onSnapshot(doc(db, "workspaces", currentWS), snap => {
                tiposDoc = snap.data().tiposDoc || [];
                let h = "", opts = "";
                tiposDoc.forEach(t => {
                    h += `<div>${t}</div>`;
                    opts += `<option value="${t}">${t}</option>`;
                });
                document.getElementById('list-tipos').innerHTML = h;
                document.getElementById('sol-tipo-doc').innerHTML = opts;
            });

            onSnapshot(q("users"), s => {
                let h = "";
                s.forEach(d => {
                    const u = d.data();
                    h += `<tr><td>${u.nombre}</td><td>${u.role}</td><td><button onclick="del('users','${d.id}')">X</button></td></tr>`;
                });
                document.getElementById('tbody-colabs').innerHTML = h;
            });
        }

        document.getElementById('btnSendSol').onclick = async () => {
            window.showLoading();
            const cid = await getNextSequenceId();
            const data = {
                wsId: currentWS,
                customId: cid,
                titulo: document.getElementById('sol-tit').value,
                accion: document.getElementById('sol-accion').value,
                tipoDoc: document.getElementById('sol-tipo-doc').value,
                gerencia: document.getElementById('sol-ger').value,
                departamento: document.getElementById('sol-dep').value,
                motivo: document.getElementById('sol-motivo').value,
                solicitante: userData.nombre,
                estado: "Pendiente Verificado",
                idx: 1,
                chat: [{u: "SISTEMA", m: "Creada con ID: " + cid, t: new Date().toLocaleString()}]
            };
            await addDoc(collection(db, "Solicitudes"), data);
            window.hideLoading();
            alert("Enviada con ID: " + cid);
        };

        window.agregarTipoDoc = async () => {
            const v = document.getElementById('t-nom').value.trim();
            if(v) {
                tiposDoc.push(v);
                await updateDoc(doc(db, "workspaces", currentWS), { tiposDoc: tiposDoc });
            }
        };

        window.guardarGerencia = async () => {
            const n = document.getElementById('g-nom').value.trim();
            if(n) await addDoc(collection(db, "Gerencias"), { nombre: n, wsId: currentWS });
        };

        window.guardarDepartamento = async () => {
            const g = document.getElementById('d-ger-sel').value;
            const n = document.getElementById('d-nom').value.trim();
            if(g && n) await addDoc(collection(db, "Departamentos"), { nombre: n, gerencia: g, wsId: currentWS });
        };

        window.actualizarDeptos = (ger) => {
            const filtered = allDeps.filter(d => d.gerencia === ger);
            let h = "<option value=''>-- Seleccionar --</option>";
            filtered.forEach(d => h += `<option value="${d.nombre}">${d.nombre}</option>`);
            document.getElementById('sol-dep').innerHTML = h;
        };

        window.logout = () => signOut(auth).then(() => location.reload());
        window.del = async (c, id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, c, id)); };

    </script>
</body>
</html>
